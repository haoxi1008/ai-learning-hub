name: Daily Fetch and Translate

on:
  schedule:
    # 每天早上 8:00 UTC (台灣時間 16:00) 執行
    - cron: '0 8 * * *'
  workflow_dispatch:  # 也可以手動觸發

jobs:
  fetch-and-translate:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 anthropic
          
      - name: Run fetch and translate
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python fetch_and_translate.py
        
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add articles.json
          git commit -m "🤖 Auto: Fetch and translate articles - $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
        continue-on-error: true
